<!DOCTYPE html>
<html>
<head>
  <title>Edit Resume</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>

<div class="admin-layout">

  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <a href="/admin">Dashboard</a>
    <a href="/admin/change-password">Change Password</a>
    <a href="/admin/logout">Logout</a>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <h1>Edit Resume</h1>
    </div>

    <form method="POST" class="change-box">

      <label>Name</label>
      <input type="text" name="name" value="{{ resume.name }}">

      <label>Job Title</label>
      <input type="text" name="job_title" value="{{ resume.job_title }}">

      <label>Phone</label>
      <input type="text" name="phone" value="{{ resume.phone }}">

      <label>Email</label>
      <input type="email" name="email" value="{{ resume.email }}">

      <label>City</label>
      <input type="text" name="city" value="{{ resume.city }}">

      <label>Skills</label>
      <textarea name="skills">{{ resume.skills }}</textarea>

      <label>Experience</label>
      <textarea name="experience">{{ resume.experience }}</textarea>

      <button type="submit">Update Resume</button>

    </form>
  </main>

</div>

</body>
</html>
